<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debates — The Best Again</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="battles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="traction.js" defer></script>
</head>
<body class="battles-page">
  <div id="tractionModal" class="traction-modal" style="display:none;"></div>
  <nav class="topbar topbar-sticky" id="topbarNav"></nav>
  <script src="topbar.js"></script>

  <main class="debates-main">

    <!-- Hero -->
    <header class="debates-hero">
      <div class="debates-hero-eyebrow">The Best Again</div>
      <h1 class="debates-hero-title">Debates</h1>
      <p class="debates-hero-sub">Las grandes preguntas de la gastronomía española. Vota y descubre qué piensa Barcelona.</p>
      <div class="debates-stats" id="debatesStats" style="display:none;"></div>
    </header>

    <!-- Feed -->
    <div class="debates-feed" id="debatesFeed">
      <!-- Skeleton -->
      <div class="debates-skeleton" id="debatesSkeleton">
        <div class="debates-skeleton-item"></div>
        <div class="debates-skeleton-item"></div>
        <div class="debates-skeleton-item"></div>
      </div>
    </div>

    <!-- Empty state -->
    <div class="debates-empty" id="debatesEmpty" style="display:none;">
      <div class="debates-empty-icon">🗳</div>
      <div>No debates available yet.</div>
    </div>

  </main>

  <script src="battles.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initBattles);
  </script>
</body>
</html>
