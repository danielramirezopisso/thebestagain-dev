<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debates — The Best Again</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="battles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="accessibility.js"></script>
  <script src="traction.js" defer></script>
</head>
<body class="battles-page">
  <div id="tractionModal" class="traction-modal" style="display:none;"></div>
  <header class="topbar topbar-sticky">
    <a class="brand" href="index.html">TBA</a>
    <nav class="nav" id="mainNav">
      <a href="index.html">Home</a>
      <a href="map.html">Map</a>
      <a href="products.html">Products</a>
      <a href="rutas.html">Rutas</a>
      <a href="rankings.html">Rankings</a>
      <a href="battles.html" class="active">Debates</a>
    </nav>
    <div class="nav-right">
      <span id="authStatus" class="auth-pill"></span>
      <button class="burger" id="burgerBtn" onclick="toggleNav()" aria-label="Menu" aria-expanded="false">&#9776;</button>
    </div>
  </header>
  <script src="auth.js"></script>
  <script src="header-auth.js"></script>

  <main class="debates-main">

    <!-- Hero -->
    <header class="debates-hero">
      <div class="debates-hero-eyebrow">The Best Again</div>
      <h1 class="debates-hero-title">Debates</h1>
      <p class="debates-hero-sub">The debates that divide tables, families and friends.</p>
      <div class="debates-stats" id="debatesStats" style="display:none;"></div>
    </header>

    <!-- Feed -->
    <div class="debates-feed" id="debatesFeed">
      <!-- Skeleton -->
      <div class="debates-skeleton" id="debatesSkeleton">
        <div class="debates-skeleton-item"></div>
        <div class="debates-skeleton-item"></div>
        <div class="debates-skeleton-item"></div>
      </div>
    </div>

    <!-- Empty state -->
    <div class="debates-empty" id="debatesEmpty" style="display:none;">
      <div class="debates-empty-icon">🗳</div>
      <div>No debates available yet.</div>
    </div>

  </main>

  <script src="battles.js?v=2"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initBattles);
  </script>
</body>
</html>
