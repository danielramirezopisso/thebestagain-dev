<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Best Again — Reset Password</title>
  <link rel="stylesheet" href="base.css?v=1778169939" />
  <link rel="stylesheet" href="login.css" />
  <!-- Google Analytics 4 — replace G-VYVTQPBTPC with your Measurement ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VYVTQPBTPC"></script>
  <script>

<body class="login-bg">
  <header class="topbar topbar-sticky">
    <a class="brand" href="index.html">TBA</a>
    <nav class="nav" id="mainNav">
      <a href="index.html">Home</a>
      <a href="map.html">Map</a>
      <a href="products.html">Products</a>
    </nav>
    <div class="nav-right">
      <span id="authStatus" class="auth-pill"></span>
      <button class="burger" id="burgerBtn" onclick="toggleNav()" aria-label="Menu" aria-expanded="false">&#9776;</button>
    </div>
  </header>

  <div class="login-main">
    <div class="login-box">

      <div class="login-brand">
        <h1>Set new password</h1>
        <p class="login-sub">Choose a new password for your account.</p>
      </div>

      <!-- Shown while reading the token -->
      <div id="stateLoading" style="text-align:center; padding: 12px 0; color: var(--muted); font-size:14px;">
        Verifying link…
      </div>

      <!-- Shown when token is valid — password form -->
      <div id="stateForm" style="display:none;">
        <div class="field">
          <label class="field-label" for="newPassword">New password</label>
          <input class="field-input" type="password" id="newPassword"
                 placeholder="At least 6 characters" autocomplete="new-password" />
        </div>
        <div class="field">
          <label class="field-label" for="confirmPassword">Confirm password</label>
          <input class="field-input" type="password" id="confirmPassword"
                 placeholder="Repeat new password" autocomplete="new-password" />
        </div>
        <button class="auth-btn" id="submitBtn" onclick="doReset()">Set new password</button>
        <p class="auth-status" id="formStatus"></p>
      </div>

      <!-- Shown on success -->
      <div id="stateSuccess" style="display:none;" class="confirm-sent">
        <div class="confirm-icon">✅</div>
        <h2>Password updated</h2>
        <p class="login-sub" style="margin-bottom:20px;">You can now log in with your new password.</p>
        <a class="auth-btn" href="login.html" style="display:block; text-align:center; text-decoration:none;">
          Go to login
        </a>
      </div>

      <!-- Shown when link is invalid/expired -->
      <div id="stateError" style="display:none;" class="confirm-sent">
        <div class="confirm-icon">⚠️</div>
        <h2>Link expired</h2>
        <p class="login-sub" style="margin-bottom:20px;">
          This reset link has expired or already been used.<br>
          Request a new one from the login page.
        </p>
        <a class="auth-btn" href="login.html" style="display:block; text-align:center; text-decoration:none;">
          Back to login
        </a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="accessibility.js"></script>
  <script src="auth.js"></script>

  <script>
  function show(id) {
    ['stateLoading','stateForm','stateSuccess','stateError'].forEach(s => {
      document.getElementById(s).style.display = s === id ? 'block' : 'none';
    });
  }

  // Supabase puts the recovery token in the URL hash:
  // #access_token=xxx&refresh_token=yyy&type=recovery
  // We need to let the Supabase client pick it up by calling getSession(),
  // then check that type=recovery is present.
  async function init() {
    const hash = window.location.hash;

    // If no hash at all — invalid direct visit
    if (!hash || !hash.includes('access_token')) {
      show('stateError');
      return;
    }

    // Only handle recovery type
    if (!hash.includes('type=recovery')) {
      show('stateError');
      return;
    }

    // Let Supabase JS parse the hash and establish a session
    // (it does this automatically on createClient, but we wait for it)
    const { data, error } = await sb.auth.getSession();

    if (error || !data.session) {
      show('stateError');
      return;
    }

    // Valid recovery session — show the form
    show('stateForm');
    document.getElementById('newPassword').focus();
  }

  async function doReset() {
    const pw  = document.getElementById('newPassword').value.trim();
    const pw2 = document.getElementById('confirmPassword').value.trim();
    const status = document.getElementById('formStatus');

    if (!pw) { status.textContent = 'Please enter a new password.'; return; }
    if (pw.length < 6) { status.textContent = 'Password must be at least 6 characters.'; return; }
    if (pw !== pw2) { status.textContent = 'Passwords do not match.'; return; }

    status.textContent = '';
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const { error } = await sb.auth.updateUser({ password: pw });

    if (error) {
      status.textContent = error.message || 'Something went wrong. Try again.';
      btn.disabled = false;
      btn.textContent = 'Set new password';
      return;
    }

    // Sign out after reset so user logs in fresh
    await sb.auth.signOut();
    show('stateSuccess');
  }

  // Allow submitting with Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('stateForm').style.display !== 'none') {
      doReset();
    }
  });

  // Burger menu
  function toggleNav() {
    const nav = document.getElementById('mainNav');
    const btn = document.getElementById('burgerBtn');
    if (!nav || !btn) return;
    const open = nav.classList.toggle('nav-open');
    btn.innerHTML = open ? '&#10005;' : '&#9776;';
    btn.setAttribute('aria-expanded', open);
  }

  init();
  </script>
</body>
</html>
