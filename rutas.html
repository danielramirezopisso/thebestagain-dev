  <script>
  function toggleNav() {
    const nav = document.getElementById('mainNav');
    const btn = document.getElementById('burgerBtn');
    const open = nav.classList.toggle('nav-open');
    btn.innerHTML = open ? '&#10005;' : '&#9776;';
    btn.setAttribute('aria-expanded', open);
  }
  document.addEventListener('DOMContentLoaded', () => {
    const nav = document.getElementById('mainNav');
    if (nav) nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      nav.classList.remove('nav-open');
      const btn = document.getElementById('burgerBtn');
      if (btn) { btn.innerHTML = '&#9776;'; btn.setAttribute('aria-expanded', false); }
    }));
  });
  </script>
<button class="scroll-top-btn" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<script>(function(){var b=document.getElementById('scrollTopBtn');if(!b)return;window.addEventListener('scroll',function(){b.classList.toggle('visible',window.scrollY>300)},{passive:true});})();</script>
