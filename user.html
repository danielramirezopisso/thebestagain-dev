<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet" />
  <title>My Profile — The Best Again</title>
  <meta name="description" content="Your food profile on The Best Again." />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VYVTQPBTPC"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-VYVTQPBTPC");</script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="base.css?v=1779265061" />
  <link rel="stylesheet" href="votes.css?v=1779265061" />
  <link rel="stylesheet" href="user.css?v=1779265061" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <meta property="og:image" content="https://thebestagain.com/og-image.png">
  <meta property="og:site_name" content="The Best Again">
</head>

<body onload="initUserPage()">

  <header class="topbar topbar-sticky">
    <a class="brand" href="index.html">TBA</a>
    <nav class="nav" id="mainNav">
      <a href="index.html">Home</a>
      <a href="map.html">Map</a>
      <a href="products.html">Products</a>
      <a href="rutas.html">Rutas</a>
      <a href="battles.html">Debates</a>
    </nav>
    <div class="nav-right">
      </div>
    </div>

    <!-- WISHLIST -->
    <div class="user-tab-panel" id="panel-wishlist">
      <div class="user-panel-head">
        <p class="user-panel-status" id="wishlistStatus"></p>
        <a id="wishlistShareLink" class="user-action-btn" href="#" target="_blank">🔗 Share wishlist</a>
      </div>
      <div id="wishlistItems"></div>
    </div>

    <!-- MY PLACES -->
    <div class="user-tab-panel" id="panel-places">
      <div id="placesList"></div>
    </div>

    <!-- COMMENTS -->
    <div class="user-tab-panel" id="panel-comments">
      <div id="commentsList"></div>
    </div>

    <!-- PHOTOS -->
    <div class="user-tab-panel" id="panel-photos">
      <div id="photosList" class="user-photos-grid"></div>
    </div>

  </main>

  <!-- Edit place modal -->
  <div class="edit-modal-overlay" id="editModalOverlay" onclick="if(event.target===this)closeEditModal()">
    <div class="edit-modal-box">
      <div class="edit-modal-head">
        <h2 class="edit-modal-title">Edit place</h2>
        <button class="edit-modal-close" onclick="closeEditModal()">✕</button>
      </div>
      <div class="edit-modal-body">
        <div class="edit-field">
          <label class="edit-label">Name</label>
          <input class="edit-input" id="editTitle" type="text" placeholder="Place name" />
        </div>
        <div class="edit-field">
          <label class="edit-label">Category</label>
          <select class="edit-input" id="editCategory"></select>
        </div>
        <div class="edit-field">
          <label class="edit-label">Address</label>
          <input class="edit-input" id="editAddress" type="text" placeholder="Street address" />
        </div>
        <div class="edit-field">
          <label class="edit-label">Pin location
            <span class="edit-label-hint" id="editMapHint">Tap the map to move the pin</span>
          </label>
          <div id="editMap" class="edit-map"></div>
          <p class="edit-coords-display" id="editCoordsDisplay"></p>
        </div>
      </div>
      <div class="edit-modal-foot">
        <p class="edit-status muted" id="editModalStatus"></p>
        <div class="edit-modal-actions">
          <button class="tba-btn" onclick="closeEditModal()">Cancel</button>
          <button class="tba-btn tba-btn-primary" id="editSaveBtn" onclick="saveEditModal()">Save changes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Deactivate modal -->
  <div class="edit-modal-overlay" id="deactivateOverlay" onclick="if(event.target===this)closeDeactivate()">
    <div class="edit-modal-box edit-modal-box--small">
      <div class="edit-modal-head">
        <h2 class="edit-modal-title">Deactivate place?</h2>
        <button class="edit-modal-close" onclick="closeDeactivate()">✕</button>
      </div>
      <div class="edit-modal-body">
        <p>This will remove <strong id="deactivateName"></strong> from the map and all lists.</p>
      </div>
      <div class="edit-modal-foot">
        <p class="edit-status muted" id="deactivateStatus"></p>
        <div class="edit-modal-actions">
          <button class="tba-btn" onclick="closeDeactivate()">Cancel</button>
          <button class="tba-btn tba-btn-danger" id="deactivateConfirmBtn" onclick="confirmDeactivate()">Yes, deactivate</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="accessibility.js"></script>
  <script src="auth.js"></script>
  <script src="header-auth.js"></script>
  <script>renderAuthHeader();</script>
  <script src="wishlist-btn.js"></script>
  <script src="votes.js?v=3"></script>
  <script src="user.js?v=9"></script>
  <script>
  function toggleNav() {
    const nav = document.getElementById('mainNav');
    const btn = document.getElementById('burgerBtn');
    const open = nav.classList.toggle('nav-open');
    btn.innerHTML = open ? '&#10005;' : '&#9776;';
  }
  document.addEventListener('DOMContentLoaded', () => {
    const nav = document.getElementById('mainNav');
    if (nav) nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      nav.classList.remove('nav-open');
      document.getElementById('burgerBtn').innerHTML = '&#9776;';
    }));
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeEditModal(); closeDeactivate(); }
    });
  });
  </script>

  <!-- Photo lightbox -->
  <div id="photoLightbox" style="display:none;" class="lb-overlay" onclick="closeLightbox()">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <img id="lbImg" class="lb-img" src="" onclick="event.stopPropagation()" />
    <div id="lbCounter" class="lb-counter"></div>
    <div id="lbNav" class="lb-nav" style="display:none;">
      <button class="lb-btn" onclick="event.stopPropagation();lbNav(-1)">←</button>
      <button class="lb-btn" onclick="event.stopPropagation();lbNav(1)">→</button>
    </div>
  </div>
  <button class="scroll-top-btn" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
  <script>
  (function(){
    var btn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', function() {
      btn.classList.toggle('visible', window.scrollY > 300);
    }, {passive: true});
  })();
  </script>

  <!-- Global Search Overlay -->
  <div class="gs-overlay" id="gsOverlay">
    <input id="gsInput" type="search" placeholder="Search places, categories…" autocomplete="off" />
    <button class="gs-close-btn" onclick="closeGlobalSearch()">Cancel</button>
  </div>
  <div id="gsResults"></div>

  <script src="search.js"></script>
  <script>initGlobalSearch();</script>
</body>
</html>
