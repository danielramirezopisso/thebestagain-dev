<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet" />
  <title>My Profile — The Best Again</title>
  <meta name="description" content="Your food profile on The Best Again." />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VYVTQPBTPC"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-VYVTQPBTPC");</script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="base.css?v=2" />
  <link rel="stylesheet" href="votes.css" />
  <link rel="stylesheet" href="user.css?v=1778844368" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <meta property="og:image" content="https://thebestagain.com/og-image.png">
  <meta property="og:site_name" content="The Best Again">
</head>

<body onload="initUserPage()">

  <header class="topbar topbar-sticky">
    <a class="brand" href="index.html">TBA</a>
    <nav class="nav" id="mainNav">
      <a href="index.html">Home</a>
      <a href="map.html">Map</a>
      <a href="products.html">Products</a>
      <a href="rutas.html">Rutas</a>
      <a href="ranking.html">Rankings</a>
      <a href="battles.html">Debates</a>
    </nav>
    <div class="nav-right">
      <span id="authStatus" class="auth-pill"></span>
      <button class="burger" id="burgerBtn" onclick="toggleNav()" aria-label="Menu">&#9776;</button>
    </div>
  </header>

  <main class="user-main">

    <!-- ── HERO ── -->
    <section class="user-hero">
      <div class="user-hero-inner">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-hero-body">
          <h1 class="user-name" id="userName">—</h1>
          <p class="user-joined" id="userJoined"></p>
        </div>
      </div>

      <!-- Stats row -->
      <div class="user-stats">
        <div class="user-stat">
          <span class="user-stat-val" id="statVotes">—</span>
          <span class="user-stat-label">votes</span>
        </div>
        <div class="user-stat-sep"></div>
        <div class="user-stat">
          <span class="user-stat-val" id="statAvg">—</span>
          <span class="user-stat-label">avg score</span>
        </div>
        <div class="user-stat-sep"></div>
        <div class="user-stat">
          <span class="user-stat-val" id="statMarkers">—</span>
          <span class="user-stat-label">places added</span>
        </div>
      </div>
    </section>

    <!-- ── TABS — desktop pills, mobile dropdown ── -->
    <div class="user-tabs-wrap">
      <!-- Desktop: pill tabs -->
      <div class="user-tabs">
        <button class="user-tab active" data-tab="votes"    onclick="switchTab('votes')">Votes</button>
        <button class="user-tab"        data-tab="wishlist" onclick="switchTab('wishlist')">Wishlist</button>
        <button class="user-tab"        data-tab="places"   onclick="switchTab('places')">Places</button>
        <button class="user-tab"        data-tab="comments" onclick="switchTab('comments')">Comments</button>
        <button class="user-tab"        data-tab="photos"   onclick="switchTab('photos')">Photos</button>
      </div>
      <!-- Mobile: dropdown -->
      <select class="user-tabs-select" id="userTabSelect" onchange="switchTab(this.value)">
        <option value="votes">Votes</option>
        <option value="wishlist">Wishlist</option>
        <option value="places">Places</option>
        <option value="comments">Comments</option>
        <option value="photos">Photos</option>
      </select>
    </div>

    <!-- ── TAB PANELS ── -->

    <!-- VOTES -->
    <div class="user-tab-panel active" id="panel-votes">
      <div id="normalView">
        <div class="user-panel-head">
          <p id="votesStatus" class="user-panel-status"></p>
          <!-- Edit votes button hidden — new ranking method coming -->
        </div>
        <div id="votesByCategory"></div>
      </div>
      <div id="editView" style="display:none;">
        <div class="edit-votes-header">
          <h2 style="margin:0;font-size:17px;">Edit votes</h2>
          <button class="tba-btn" onclick="exitEditMode()">← Back</button>
        </div>
        <div class="edit-votes-layout">
          <div class="edit-votes-sidebar">
            <div class="edit-sidebar-title">Category</div>
            <div id="editCatList"></div>
          </div>
          <div class="edit-votes-main">
            <div id="distributeBar" class="distribute-bar" style="display:none;">
              <span class="distribute-label">Distribute</span>
              <input id="distTop"    class="distribute-input" type="number" min="1" max="10" step="0.5" placeholder="Top (e.g. 9)" />
              <span class="distribute-sep">→</span>
              <input id="distBottom" class="distribute-input" type="number" min="1" max="10" step="0.5" placeholder="Bottom (e.g. 6)" />
              <button class="tba-btn" onclick="distributeScores()">Apply</button>
              <span id="distributeStatus" class="muted" style="font-size:12px;"></span>
            </div>
            <div id="editEmptyState" class="edit-empty-state" style="display:none;">
              <p class="muted">Select a category on the left to edit your votes.</p>
            </div>
            <div id="editCardsList" class="edit-cards-list"></div>
            <div class="edit-votes-foot">
              <button id="btnSaveVotes" class="tba-btn tba-btn-primary" onclick="saveVoteEdits()" disabled>Save changes</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- WISHLIST -->
    <div class="user-tab-panel" id="panel-wishlist">
      <div class="user-panel-head">
        <p class="user-panel-status" id="wishlistStatus"></p>
        <a id="wishlistShareLink" class="user-action-btn" href="#" target="_blank">🔗 Share wishlist</a>
      </div>
      <div id="wishlistItems"></div>
    </div>

    <!-- MY PLACES -->
    <div class="user-tab-panel" id="panel-places">
      <div id="placesList"></div>
    </div>

    <!-- COMMENTS -->
    <div class="user-tab-panel" id="panel-comments">
      <div id="commentsList"></div>
    </div>

    <!-- PHOTOS -->
    <div class="user-tab-panel" id="panel-photos">
      <div id="photosList" class="user-photos-grid"></div>
    </div>

  </main>

  <!-- Edit place modal -->
  <div class="edit-modal-overlay" id="editModalOverlay" onclick="if(event.target===this)closeEditModal()">
    <div class="edit-modal-box">
      <div class="edit-modal-head">
        <h2 class="edit-modal-title">Edit place</h2>
        <button class="edit-modal-close" onclick="closeEditModal()">✕</button>
      </div>
      <div class="edit-modal-body">
        <div class="edit-field">
          <label class="edit-label">Name</label>
          <input class="edit-input" id="editTitle" type="text" placeholder="Place name" />
        </div>
        <div class="edit-field">
          <label class="edit-label">Category</label>
          <select class="edit-input" id="editCategory"></select>
        </div>
        <div class="edit-field">
          <label class="edit-label">Address</label>
          <input class="edit-input" id="editAddress" type="text" placeholder="Street address" />
        </div>
        <div class="edit-field">
          <label class="edit-label">Pin location
            <span class="edit-label-hint" id="editMapHint">Tap the map to move the pin</span>
          </label>
          <div id="editMap" class="edit-map"></div>
          <p class="edit-coords-display" id="editCoordsDisplay"></p>
        </div>
      </div>
      <div class="edit-modal-foot">
        <p class="edit-status muted" id="editModalStatus"></p>
        <div class="edit-modal-actions">
          <button class="tba-btn" onclick="closeEditModal()">Cancel</button>
          <button class="tba-btn tba-btn-primary" id="editSaveBtn" onclick="saveEditModal()">Save changes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Deactivate modal -->
  <div class="edit-modal-overlay" id="deactivateOverlay" onclick="if(event.target===this)closeDeactivate()">
    <div class="edit-modal-box edit-modal-box--small">
      <div class="edit-modal-head">
        <h2 class="edit-modal-title">Deactivate place?</h2>
        <button class="edit-modal-close" onclick="closeDeactivate()">✕</button>
      </div>
      <div class="edit-modal-body">
        <p>This will remove <strong id="deactivateName"></strong> from the map and all lists.</p>
      </div>
      <div class="edit-modal-foot">
        <p class="edit-status muted" id="deactivateStatus"></p>
        <div class="edit-modal-actions">
          <button class="tba-btn" onclick="closeDeactivate()">Cancel</button>
          <button class="tba-btn tba-btn-danger" id="deactivateConfirmBtn" onclick="confirmDeactivate()">Yes, deactivate</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="accessibility.js"></script>
  <script src="auth.js"></script>
  <script src="header-auth.js"></script>
  <script>renderAuthHeader();</script>
  <script src="wishlist-btn.js"></script>
  <script src="votes.js?v=3"></script>
  <script src="user.js?v=9"></script>
  <script>
  function toggleNav() {
    const nav = document.getElementById('mainNav');
    const btn = document.getElementById('burgerBtn');
    const open = nav.classList.toggle('nav-open');
    btn.innerHTML = open ? '&#10005;' : '&#9776;';
  }
  document.addEventListener('DOMContentLoaded', () => {
    const nav = document.getElementById('mainNav');
    if (nav) nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      nav.classList.remove('nav-open');
      document.getElementById('burgerBtn').innerHTML = '&#9776;';
    }));
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeEditModal(); closeDeactivate(); }
    });
  });
  </script>
</body>
</html>
