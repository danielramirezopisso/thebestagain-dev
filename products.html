  <script>
  function toggleNav() {
    const nav = document.getElementById('mainNav');
    const btn = document.getElementById('burgerBtn');
    const open = nav.classList.toggle('nav-open');
    btn.innerHTML = open ? '&#10005;' : '&#9776;';
  }
  document.addEventListener('DOMContentLoaded', () => {
    const nav = document.getElementById('mainNav');
    if (nav) nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      nav.classList.remove('nav-open');
      document.getElementById('burgerBtn').innerHTML = '&#9776;';
    }));
  });

  function toggleFilterDrawer() {
    const drawer = document.getElementById('prodFilterDrawer');
    const overlay = document.getElementById('prodFilterOverlay');
    const open = drawer.style.display === 'none';
    drawer.style.display = open ? 'block' : 'none';
    overlay.style.display = open ? 'block' : 'none';
  }
  function closeFilterDrawer() {
    document.getElementById('prodFilterDrawer').style.display = 'none';
    document.getElementById('prodFilterOverlay').style.display = 'none';
  }
  function toggleAddPanel() {
    const overlay = document.getElementById('prodAddOverlay');
    overlay.style.display = overlay.style.display === 'none' ? 'flex' : 'none';
  }
  </script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var on = localStorage.getItem('tba_colorblind') === '1';
  document.querySelectorAll('.cb-toggle-input').forEach(function(el) { el.checked = on; });
});
</script>

  <!-- Scroll to top -->
  <button class="scroll-top-btn" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">↑</button>
<script>
(function(){
  var btn = document.getElementById('scrollTopBtn');
  if (!btn) return;
  window.addEventListener('scroll', function() {
    btn.classList.toggle('visible', window.scrollY > 300);
  }, {passive: true});
})();
</script>
